# version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shop_sc
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    platform: linux/amd64
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  pg-data:
